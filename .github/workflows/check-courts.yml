name: Check EGP Private Courts
on:
  schedule:
    - cron: '0,10,20,30,40,50 7-22 * * *'
  workflow_dispatch:
jobs:
  check-courts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check court availability
        env:
          EGP_EMAIL: ${{ secrets.EGP_EMAIL }}
          EGP_PASSWORD: ${{ secrets.EGP_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          SCRIPT_CODE: ${{ secrets.SCRIPT_CODE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node check-courts.js
