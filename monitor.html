<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Padel Courts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f0a;color:#e8f5e8;font-family:system-ui,sans-serif;padding-bottom:40px;}
header{padding:70px 20px 20px;display:flex;justify-content:space-between;align-items:flex-start;}
h1{font-size:48px;font-weight:900;color:#00e676;line-height:1;letter-spacing:2px;}
.gear{font-size:28px;cursor:pointer;margin-top:8px;padding:8px;background:#111811;border:1px solid #2a352a;border-radius:12px;}
.badge{display:inline-flex;align-items:center;gap:4px;background:#00e676;color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:6px;}
.dot{width:6px;height:6px;background:#000;border-radius:50%;animation:p 1.5s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.2}}
.sub{color:#7a8f7a;font-size:13px;margin-top:4px;}
.page{display:none;}.page.active{display:block;}
.sec{margin:0 16px 16px;background:#111811;border:1px solid #2a352a;border-radius:16px;overflow:hidden;}
.sec-h{padding:12px 16px;border-bottom:1px solid #2a352a;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#7a8f7a;text-transform:uppercase;}
.sec-b{padding:16px;}
label{display:block;font-size:11px;font-weight:600;color:#7a8f7a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
input{width:100%;background:#1a211a;border:1px solid #2a352a;border-radius:10px;padding:12px 14px;color:#e8f5e8;font-size:15px;outline:none;-webkit-appearance:none;margin-bottom:12px;}
input:focus{border-color:#00e676;}
.hint{font-size:11px;color:#7a8f7a;margin-top:-8px;margin-bottom:12px;line-height:1.4;}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.vcard{background:#1a211a;border:1.5px solid #2a352a;border-radius:12px;padding:12px;cursor:pointer;position:relative;}
.vcard.sel{border-color:#00e676;background:rgba(0,230,118,0.08);}
.vcard:active{opacity:0.8;}
.vname{font-size:13px;font-weight:600;padding-right:18px;line-height:1.3;}
.vloc{font-size:11px;color:#7a8f7a;margin-top:2px;}
.vtick{position:absolute;top:8px;right:8px;width:16px;height:16px;background:#00e676;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:900;}
.vcard.sel .vtick{display:flex;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{background:#1a211a;border:1.5px solid #2a352a;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:#7a8f7a;}
.chip.sel{border-color:#00e676;color:#00e676;background:rgba(0,230,118,0.08);}
.btns{display:flex;gap:10px;margin:0 16px 16px;}
.btn{flex:1;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:800;letter-spacing:1.5px;cursor:pointer;}
.btn-g{background:#00e676;color:#000;}
.btn-d{background:#111811;border:1px solid #2a352a;color:#7a8f7a;}
.btn:active{opacity:0.85;}
.btn:disabled{opacity:0.4;}
.sp{display:none;width:18px;height:18px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
.btn-d .sp{border-top-color:#7a8f7a;}
.loading .bt{display:none;}.loading .sp{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.sbar{margin:0 16px 12px;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:12px;padding:12px 16px;display:none;justify-content:space-between;align-items:center;}
.snum{font-size:28px;font-weight:900;color:#00e676;line-height:1;}
.slbl{font-size:12px;color:#7a8f7a;margin-top:2px;}
.sat{font-size:11px;color:#7a8f7a;text-align:right;}
.emsg{margin:0 16px 16px;background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);border-radius:12px;padding:14px;font-size:13px;color:#ff5252;display:none;}
.imsg{margin:0 16px 16px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:12px;padding:14px;font-size:13px;color:#7a8f7a;display:none;}
.res{margin:0 16px 16px;}
.ddiv{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#7a8f7a;text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:8px;}
.ddiv::after{content:'';flex:1;height:1px;background:#2a352a;}
.scard{background:#111811;border:1px solid rgba(0,230,118,0.3);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.scard:active{background:rgba(0,230,118,0.05);}
.sdot{width:10px;height:10px;border-radius:50%;background:#00e676;box-shadow:0 0 8px #00e676;flex-shrink:0;}
.sinfo{flex:1;}
.stime{font-size:16px;font-weight:700;}
.scourt{font-size:12px;color:#7a8f7a;margin-top:2px;}
.bbtn{font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;background:#00e676;color:#000;white-space:nowrap;}
.empty{text-align:center;padding:40px 20px;color:#7a8f7a;}
.empty .ei{font-size:48px;margin-bottom:12px;}
.empty .et{color:#e8f5e8;font-size:18px;font-weight:700;margin-bottom:8px;}
.sethdr{padding:70px 20px 20px;display:flex;align-items:center;gap:12px;}
.back{font-size:28px;cursor:pointer;padding:8px;background:#111811;border:1px solid #2a352a;border-radius:12px;}
.setttl{font-size:32px;font-weight:900;letter-spacing:2px;}
.vrow{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #2a352a;}
.vrow:last-child{border-bottom:none;}
.vri{flex:1;}
.vrn{font-size:14px;font-weight:600;}
.vrs​​​​​​​​​​​​​​​​
