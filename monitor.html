<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Padel Court Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#00e676;--red:#ff5252;--bg:#0a0f0a;--surface:#111811;--surface2:#1a211a;--border:#2a352a;--text:#e8f5e8;--text-dim:#7a8f7a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,230,118,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:430px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}

header{padding:60px 20px 24px;padding-top:calc(60px + env(safe-area-inset-top));display:flex;align-items:flex-start;justify-content:space-between;}
h1{font-family:‘Bebas Neue’,sans-serif;font-size:48px;line-height:1;letter-spacing:2px;color:var(–green);text-shadow:0 0 40px rgba(0,230,118,0.3);}
.live-badge{background:var(–green);color:#000;font-size:10px;font-weight:600;letter-spacing:1px;padding:4px 8px;border-radius:20px;margin-top:6px;display:inline-flex;align-items:center;gap:4px;}
.live-dot{width:6px;height:6px;background:#000;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.subtitle{color:var(–text-dim);font-size:13px;margin-top:4px;}
.icon-btn{width:44px;height:44px;background:var(–surface);border:1px solid var(–border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;flex-shrink:0;margin-top:8px;}
.icon-btn:active{transform:scale(0.95);}

.settings-header{padding:60px 20px 20px;padding-top:calc(60px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;}
.settings-title{font-family:‘Bebas Neue’,sans-serif;font-size:32px;letter-spacing:2px;color:var(–text);}

.section{margin:0 16px 16px;background:var(–surface);border:1px solid var(–border);border-radius:16px;overflow:hidden;}
.section-header{padding:14px 16px;border-bottom:1px solid var(–border);font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(–text-dim);text-transform:uppercase;}
.section-body{padding:16px;}
.field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;font-weight:500;color:var(–text-dim);letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:var(–surface2);border:1px solid var(–border);border-radius:10px;padding:12px 14px;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.field input:focus{border-color:var(–green);}
.field-hint{font-size:11px;color:var(–text-dim);margin-top:6px;line-height:1.4;}

.venue-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.venue-card{background:var(–surface2);border:1.5px solid var(–border);border-radius:12px;padding:12px;cursor:pointer;transition:all 0.2s;text-align:left;position:relative;}
.venue-card.selected{border-color:var(–green);background:rgba(0,230,118,0.08);}
.venue-card:active{transform:scale(0.97);}
.venue-name{font-size:13px;font-weight:500;color:var(–text);margin-bottom:2px;line-height:1.3;padding-right:18px;}
.venue-location{font-size:11px;color:var(–text-dim);}
.venue-tick{position:absolute;top:8px;right:8px;width:16px;height:16px;background:var(–green);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:900;}
.venue-card.selected .venue-tick{display:flex;}

.venue-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(–border);}
.venue-row:last-child{border-bottom:none;}
.venue-row-info{flex:1;}
.venue-row-name{font-size:14px;font-weight:500;}
.venue-row-sub{font-size:11px;color:var(–text-dim);margin-top:2px;}
.built-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(0,230,118,0.1);color:var(–green);margin-left:6px;vertical-align:middle;}
.del-btn{width:30px;height:30px;background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.del-btn:active{opacity:0.7;}

.days-row{display:flex;gap:8px;flex-wrap:wrap;}
.day-chip{background:var(–surface2);border:1.5px solid var(–border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all 0.2s;color:var(–text-dim);}
.day-chip.selected{border-color:var(–green);color:var(–green);background:rgba(0,230,118,0.08);}

.btn-row{display:flex;gap:10px;margin:0 16px 16px;}
.btn{flex:1;padding:16px;border:none;border-radius:14px;font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(–green);color:#000;}
.btn-secondary{background:var(–surface);border:1px solid var(–border);color:var(–text-dim);}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn .sp{display:none;width:18px;height:18px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
.btn-secondary .sp{border-color:rgba(122,143,122,0.3);border-top-color:var(–text-dim);}
.btn.loading .bt{display:none;}.btn.loading .sp{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

.status-bar{margin:0 16px 12px;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:12px;padding:12px 16px;display:none;justify-content:space-between;align-items:center;}
.sc{font-family:‘Bebas Neue’,sans-serif;font-size:28px;color:var(–green);line-height:1;}
.sl{font-size:12px;color:var(–text-dim);margin-top:2px;}
.sat{font-size:11px;color:var(–text-dim);text-align:right;}
.error-msg{margin:0 16px 16px;background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);border-radius:12px;padding:14px 16px;font-size:13px;color:var(–red);display:none;}
.info-msg{margin:0 16px 16px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:12px;padding:14px 16px;font-size:13px;color:var(–text-dim);display:none;}

.results{margin:0 16px 16px;}
.date-div{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(–text-dim);text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:8px;}
.date-div::after{content:’’;flex:1;height:1px;background:var(–border);}

.slot-card{background:var(–surface);border:1px solid rgba(0,230,118,0.3);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s;animation:slideIn 0.3s ease;}
.slot-card:active{transform:scale(0.98);background:rgba(0,230,118,0.05);}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slot-dot{width:10px;height:10px;border-radius:50%;background:var(–green);box-shadow:0 0 8px var(–green);flex-shrink:0;}
.slot-info{flex:1;}
.slot-time{font-size:16px;font-weight:600;}
.slot-court{font-size:12px;color:var(–text-dim);margin-top:2px;}
.book-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(–green);color:#000;white-space:nowrap;}

.empty-msg{text-align:center;padding:40px 20px;color:var(–text-dim);}
.empty-msg .icon{font-size:48px;margin-bottom:12px;}
.empty-msg .title{color:var(–text);font-weight:600;font-size:18px;margin-bottom:8px;}

.add-form{padding:16px;border-top:1px solid var(–border);}
.add-btn{width:100%;padding:12px;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:10px;color:var(–green);font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.add-btn:active{opacity:0.8;}
.save-btn{display:block;width:calc(100% - 32px);margin:0 16px 32px;padding:16px;background:var(–green);border:none;border-radius:14px;font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:2px;color:#000;cursor:pointer;}
.save-btn:active{transform:scale(0.98);}
</style>

</head>

<script>
var BUILTIN = [
  {name:"East Grinstead Padel",location:"East Grinstead",subdomain:"eastgrinsteadpadel-gb",builtin:true},
  {name:"Bromley Sports Club",location:"Bromley, London",subdomain:"bromleysportsclub-gb",builtin:true},
  {name:"Frindsbury Tennis & Padel",location:"Rochester, Kent",subdomain:"frindsburytennisandpadelclub-gb",builtin:true},
  {name:"Stratford Padel Club",location:"London E15",subdomain:"stratfordpadelclub",builtin:true},
  {name:"UK Padel",location:"Holmer Green, Bucks",subdomain:"ukpadel-gb",builtin:true}
];

var venues = [];
var selectedVenue = null;
var selectedDays = 7;

function loadVenues() {
var custom = [];
try { custom = JSON.parse(localStorage.getItem(“custom_venues”) || “[]”); } catch(e) {}
venues = BUILTIN.concat(custom);
if (!selectedVenue) selectedVenue = venues[0];
}

function saveCustomVenues() {
var custom = venues.filter(function(v){ return !v.builtin; });
localStorage.setItem(“custom_venues”, JSON.stringify(custom));
}

function getToken(){ return document.getElementById(“ghToken”).value.trim(); }
function getRepo(){ return document.getElementById(“ghRepo”).value.trim() || “puffsdad/egp-monitor”; }

function showMain() {
document.getElementById(“mainPage”).classList.add(“active”);
document.getElementById(“settingsPage”).classList.remove(“active”);
renderVenueGrid();
}

function showSettings() {
document.getElementById(“settingsPage”).classList.add(“active”);
document.getElementById(“mainPage”).classList.remove(“active”);
renderVenueList();
}

function saveSettings() {
localStorage.setItem(“padel_ghToken”, document.getElementById(“ghToken”).value);
localStorage.setItem(“padel_ghRepo”, document.getElementById(“ghRepo”).value);
showMain();
}

function renderVenueGrid() {
var grid = document.getElementById(“venueGrid”);
grid.innerHTML = “”;
venues.forEach(function(v, i) {
var card = document.createElement(“div”);
card.className = “venue-card” + (v === selectedVenue ? “ selected” : “”);
card.innerHTML = ‘<div class="venue-tick">✓</div><div class="venue-name">’+v.name+’</div><div class="venue-location">’+v.location+’</div>’;
card.onclick = function() {
selectedVenue = v;
renderVenueGrid();
};
grid.appendChild(card);
});
}

function renderVenueList() {
var list = document.getElementById(“venueList”);
list.innerHTML = “”;
venues.forEach(function(v, i) {
var row = document.createElement(“div”);
row.className = “venue-row”;
var delBtn = v.builtin ? “” : ‘<div class="del-btn" onclick="deleteVenue('+i+')">×</div>’;
var tag = v.builtin ? ‘<span class="built-tag">built-in</span>’ : ‘’;
row.innerHTML = ‘<div class="venue-row-info"><div class="venue-row-name">’+v.name+tag+’</div><div class="venue-row-sub">’+v.subdomain+’.matchpoint.com.es</div></div>’+delBtn;
list.appendChild(row);
});
}

function deleteVenue(i) {
if (venues[i].builtin) return;
if (selectedVenue === venues[i]) selectedVenue = venues[0];
venues.splice(i, 1);
saveCustomVenues();
renderVenueList();
}

function addVenue() {
var name = document.getElementById(“newName”).value.trim();
var loc = document.getElementById(“newLoc”).value.trim();
var sub = document.getElementById(“newSub”).value.trim();
if (!name || !sub) { alert(“Please fill in venue name and subdomain.”); return; }
venues.push({name:name, location:loc||””, subdomain:sub, builtin:false});
saveCustomVenues();
document.getElementById(“newName”).value = “”;
document.getElementById(“newLoc”).value = “”;
document.getElementById(“newSub”).value = “”;
renderVenueList();
}

document.getElementById(“daysRow”).addEventListener(“click”, function(e) {
var chip = e.target.closest(”.day-chip”);
if (!chip) return;
document.querySelectorAll(”.day-chip”).forEach(function(c){ c.classList.remove(“selected”); });
chip.classList.add(“selected”);
selectedDays = parseInt(chip.dataset.days);
});

function showErr(msg){ var e=document.getElementById(“errorMsg”); e.textContent=msg; e.style.display=“block”; }
function hideErr(){ document.getElementById(“errorMsg”).style.display=“none”; }
function showInfo(msg){ var e=document.getElementById(“infoMsg”); e.textContent=msg; e.style.display=“block”; }
function hideInfo(){ document.getElementById(“infoMsg”).style.display=“none”; }

function pad(n){ return String(n).padStart(2,“0”); }

function formatDate(ddmmyyyy) {
var p = ddmmyyyy.split(”/”);
var date = new Date(p[2], p[1]-1, p[0]);
var days = [“Sunday”,“Monday”,“Tuesday”,“Wednesday”,“Thursday”,“Friday”,“Saturday”];
var months = [“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”];
var today = new Date();
var tomorrow = new Date(); tomorrow.setDate(today.getDate()+1);
if (date.toDateString()===today.toDateString()) return “TODAY”;
if (date.toDateString()===tomorrow.toDateString()) return “TOMORROW”;
return days[date.getDay()]+” “+p[0]+” “+months[date.getMonth()];
}

function bookingUrl(fecha) {
var p = fecha.split(”/”);
var dateStr = p[2]+”-”+p[1]+”-”+p[0];
var base = “https://”+selectedVenue.subdomain+”.matchpoint.com.es”;
return base+”/Bookings/CreateBooking.aspx?date=”+dateStr;
}

async function readResults() {
var token = getToken();
var repo = getRepo();
if (!token) { showErr(“Please enter your GitHub token in Settings.”); return; }
var btn = document.getElementById(“readBtn”);
btn.classList.add(“loading”); btn.disabled = true;
hideErr(); hideInfo();
document.getElementById(“results”).innerHTML = “”;
document.getElementById(“statusBar”).style.display = “none”;
try {
var res = await fetch(“https://api.github.com/repos/”+repo+”/actions/variables/LAST_RESULT”, {
headers: {“Authorization”:“Bearer “+token,“Accept”:“application/vnd.github.v3+json”}
});
if (!res.ok) throw new Error(“Could not read results (status “+res.status+”). Check your token in Settings.”);
var json = await res.json();
var val = json.value || “”;
if (!val || val===”-” || val.length<3) {
showInfo(“No results yet. Tap REFRESH to trigger a fresh check, then SHOW RESULTS after 20 seconds.”);
return;
}
var data;
try { data = JSON.parse(val); } catch(e) { showErr(“Could not parse results. Try tapping REFRESH first.”); return; }
renderResults(data);
} catch(err) {
showErr(“Error: “+err.message);
} finally {
btn.classList.remove(“loading”); btn.disabled = false;
}
}

async function triggerRefresh() {
var token = getToken();
var repo = getRepo();
if (!token) { showErr(“Please enter your GitHub token in Settings.”); return; }
var btn = document.getElementById(“refreshBtn”);
btn.classList.add(“loading”); btn.disabled = true;
hideErr(); hideInfo();
try {
var res = await fetch(“https://api.github.com/repos/”+repo+”/actions/workflows/check-courts.yml/dispatches”, {
method:“POST”,
headers:{“Authorization”:“Bearer “+token,“Accept”:“application/vnd.github.v3+json”,“Content-Type”:“application/json”},
body:JSON.stringify({ref:“main”})
});
if (res.ok || res.status===204) {
showInfo(“Refresh triggered! Wait about 20 seconds then tap SHOW RESULTS.”);
} else {
throw new Error(“Failed (status “+res.status+”)”);
}
} catch(err) {
showErr(“Error: “+err.message);
} finally {
btn.classList.remove(“loading”); btn.disabled = false;
}
}

function renderResults(data) {
var container = document.getElementById(“results”);
container.innerHTML = “”;
var totalAvail = 0;
data.forEach(function(d){ totalAvail += (d.slots||[]).length; });
document.getElementById(“statusBar”).style.display = “flex”;
document.getElementById(“availCount”).textContent = totalAvail;
document.getElementById(“checkedAt”).innerHTML = “Last checked<br>”+new Date().toLocaleTimeString([],{hour:“2-digit”,minute:“2-digit”});
if (data.length===0 || totalAvail===0) {
container.innerHTML = ‘<div class="empty-msg"><div class="icon">🙦</div><div class="title">No courts available</div><p>All private courts are booked. Try refreshing!</p></div>’;
return;
}
data.forEach(function(entry) {
var slots = entry.slots || [];
if (slots.length===0) return;
var div = document.createElement(“div”);
div.className = “date-div”;
div.textContent = formatDate(entry.date);
container.appendChild(div);
slots.forEach(function(slot) {
var card = document.createElement(“div”);
card.className = “slot-card”;
card.innerHTML = ‘<div class="slot-dot"></div><div class="slot-info"><div class="slot-time">’+(slot.time||””)+’</div><div class="slot-court">’+(slot.court||””)+’</div></div><div class="book-btn">BOOK</div>’;
card.onclick = function() {
window.open(bookingUrl(entry.date), “_blank”);
};
container.appendChild(card);
});
});
}

window.addEventListener(“load”, function() {
loadVenues();
document.getElementById(“ghToken”).value = localStorage.getItem(“padel_ghToken”) || “”;
document.getElementById(“ghRepo”).value = localStorage.getItem(“padel_ghRepo”) || “puffsdad/egp-monitor”;
renderVenueGrid();
readResults();
});
</script>

</body>
