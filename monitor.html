<title>Padel Courts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f0a;color:#e8f5e8;font-family:system-ui,sans-serif;padding-bottom:40px;}
.app{max-width:430px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
header{padding:70px 20px 20px;display:flex;justify-content:space-between;align-items:flex-start;}
h1{font-size:48px;font-weight:900;color:#00e676;line-height:1;letter-spacing:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;background:#00e676;color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:6px;}
.dot{width:6px;height:6px;background:#000;border-radius:50%;animation:p 1.5s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.2}}
.sub{color:#7a8f7a;font-size:13px;margin-top:4px;}
.ibtn{width:44px;height:44px;background:#111811;border:1px solid #2a352a;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;margin-top:8px;flex-shrink:0;}
.sethdr{padding:70px 20px 20px;display:flex;align-items:center;gap:12px;}
.setttl{font-size:32px;font-weight:900;letter-spacing:2px;}
.sec{margin:0 16px 16px;background:#111811;border:1px solid #2a352a;border-radius:16px;overflow:hidden;}
.sec-h{padding:12px 16px;border-bottom:1px solid #2a352a;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#7a8f7a;text-transform:uppercase;}
.sec-b{padding:16px;}
.lbl{display:block;font-size:11px;font-weight:600;color:#7a8f7a;text-transform:uppercase;margin-bottom:6px;}
.inp{width:100%;background:#1a211a;border:1px solid #2a352a;border-radius:10px;padding:12px 14px;color:#e8f5e8;font-size:15px;outline:none;-webkit-appearance:none;margin-bottom:12px;}
.hint{font-size:11px;color:#7a8f7a;margin-top:-8px;margin-bottom:12px;}
.vtog-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #2a352a;}
.vtog-row:last-child{border-bottom:none;}
.vtog-info{flex:1;}
.vtog-name{font-size:15px;font-weight:600;}
.vtog-loc{font-size:12px;color:#7a8f7a;margin-top:2px;}
.toggle{width:48px;height:28px;background:#2a352a;border-radius:14px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:#00e676;}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(20px);}
